<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WeQuote — Variation Review (Prototype)</title>
<style>
  :root{
    --bg:#EEF0F3; --card:#FFFFFF; --ink:#1A1D21; --ink-2:#5B6470; --ink-3:#9AA3AE;
    --line:#E4E7EB; --pending:#F59E0B; --pending-bg:#FFF6E6;
    --accept:#16A34A; --accept-bg:#EAF7EF; --reject:#DC2626; --tbc:#2563EB;
    --sel-bg:#E3E7F3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#16181C;display:flex;align-items:center;justify-content:center;}
  .app{width:100%;max-width:420px;height:100%;max-height:900px;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;}
  @media(min-width:480px){.app{border-radius:36px;border:8px solid #000;box-shadow:0 30px 80px rgba(0,0,0,.5);height:860px;}}

  .statusbar{display:flex;justify-content:space-between;padding:14px 22px 4px;font-size:14px;font-weight:700;color:var(--ink);}
  .topnav{display:flex;align-items:center;gap:10px;padding:10px 16px 4px;}
  .iconbtn{width:38px;height:38px;border-radius:50%;background:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .seg{background:#fff;border:none;border-radius:99px;padding:10px 18px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .spacer{flex:1;}
  .avatar{width:38px;height:38px;border-radius:50%;background:#3D4A5C;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .tabs{display:flex;gap:18px;padding:12px 16px 10px;font-size:14px;color:var(--ink-2);white-space:nowrap;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:7px 0;flex:0 0 auto;}
  .tab.on{background:#fff;border-radius:99px;padding:7px 16px;font-weight:700;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .count{font-size:10px;vertical-align:super;color:var(--ink-3);font-weight:600;margin-left:2px;}

  .subrow{display:flex;align-items:center;gap:10px;padding:10px 16px 6px;}
  .selecttoggle{display:flex;align-items:center;gap:9px;background:none;border:none;font-size:15px;font-weight:600;color:var(--ink);}
  .selecttoggle .box{width:22px;height:22px;border-radius:7px;border:2px solid #B9C0C9;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;transition:.15s;}
  .selecttoggle.on .box{background:var(--ink);border-color:var(--ink);}
  .summary{flex:1;text-align:right;font-size:14.5px;font-weight:700;color:var(--ink);}

  .list{flex:1;overflow-y:auto;padding:6px 12px 130px;}

  .item{display:flex;align-items:stretch;margin-bottom:12px;border-radius:14px;transition:background .2s;}
  .item .checkcol{width:0;overflow:hidden;display:flex;align-items:center;justify-content:flex-start;transition:width .22s ease;}
  .app.selectmode .item .checkcol{width:40px;}
  .chk{width:24px;height:24px;border-radius:7px;border:2px solid #B9C0C9;background:#fff;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;transition:.15s;}
  .item.selected{background:var(--sel-bg);padding:6px;margin-left:-6px;margin-right:-6px;}
  .item.selected .chk{background:var(--ink);border-color:var(--ink);}

  .card{flex:1;min-width:0;background:#fff;border-radius:12px;padding:13px 14px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .r1{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .pill{font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;}
  .pill .dot{width:7px;height:7px;border-radius:2px;}
  .pill.pending{color:var(--ink);}
  .pill.pending .dot{background:var(--pending);}
  .pill.accepted{color:var(--accept);}
  .pill.accepted .dot{background:var(--accept);border-radius:50%;}
  .pill.rejected{color:var(--reject);}
  .pill.rejected .dot{background:var(--reject);border-radius:50%;}
  .pill.tbc{color:var(--tbc);}
  .pill.tbc .dot{background:var(--tbc);border-radius:50%;}
  .valid{font-size:12px;font-weight:700;color:var(--pending);}
  .r2{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:7px;}
  .title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .value{font-size:16px;font-weight:700;flex:0 0 auto;font-variant-numeric:tabular-nums;}
  .r3{display:flex;justify-content:space-between;gap:10px;margin-top:3px;}
  .ref{font-size:12.5px;color:var(--ink-2);}
  .vlabel{font-size:12.5px;color:var(--ink-3);}
  .acts{display:flex;gap:8px;margin-top:11px;}
  .abtn{border:1px solid var(--line);background:#FAFBFC;border-radius:8px;font-size:14px;font-weight:600;color:var(--ink);padding:9px 0;flex:1;}
  .abtn.icon{flex:0 0 44px;}
  .app.selectmode .acts{display:none;}
  .item.resolved .acts{display:none;}
  .item.resolved .card{opacity:.75;}

  /* bottom bar */
  .bottombar{position:absolute;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;transform:translateY(110%);transition:transform .25s ease;}
  .bottombar.show{transform:translateY(0);}
  .total .amt{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
  .total .lbl{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
  .cta{margin-left:auto;border:none;border-radius:11px;background:var(--ink);color:#fff;font-size:14.5px;font-weight:700;padding:13px 18px;flex:0 0 auto;}
  .cta:disabled{background:#D6DAE0;color:#fff;}

  /* confirmation sheet */
  .scrim{position:absolute;inset:0;background:rgba(10,12,16,.45);opacity:0;pointer-events:none;transition:.2s;z-index:20;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;padding:8px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .28s cubic-bezier(.3,.9,.3,1);z-index:21;max-height:75%;display:flex;flex-direction:column;}
  .sheet.show{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:2px;background:#D9DDE3;margin:6px auto 12px;}
  .sheet h2{font-size:17px;font-weight:800;}
  .sheet .sub{font-size:13px;color:var(--ink-2);margin-top:4px;line-height:1.5;}
  .sheet .rows{margin:14px 0 4px;overflow-y:auto;}
  .srow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .srow .n{color:var(--ink);font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .srow .v{font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .srow.totalrow{border-bottom:none;font-size:15px;}
  .srow.totalrow .n{font-weight:800;}
  .srow.totalrow .v{font-weight:800;}
  .sheetbtns{display:flex;gap:10px;margin-top:14px;}
  .sb{flex:1;border:none;border-radius:12px;font-size:15px;font-weight:700;padding:15px 0;}
  .sb.cancel{background:#F1F3F5;color:var(--ink);}
  .sb.confirm{background:var(--accept);color:#fff;}

  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(60px);opacity:0;background:#101317;color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:99px;transition:.25s;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.35);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="statusbar"><span>9:41</span><span>▮▮▮ ⌔ ▭</span></div>

  <div class="topnav">
    <button class="iconbtn">↩</button>
    <button class="seg">Variation <span style="font-size:11px;">▼</span></button>
    <span class="spacer"></span>
    <button class="iconbtn">🔔</button>
    <div class="avatar">MM</div>
  </div>

  <div class="tabs">
    <span class="tab on">All<span class="count">04</span></span>
    <span class="tab">Pending your review<span class="count" id="pendingCount">10</span></span>
    <span class="tab">TBC<span class="count">12</span></span>
    <span class="tab">Accepted</span>
  </div>

  <div class="subrow">
    <button class="selecttoggle" id="selectToggle">
      <span class="box">✓</span> Select
    </button>
    <div class="summary" id="summaryText">10 Variations pending your review</div>
  </div>

  <div class="list" id="list"></div>

  <!-- bulk bottom bar -->
  <div class="bottombar" id="bottombar">
    <div class="total">
      <div class="amt" id="barAmt">$0.00</div>
      <div class="lbl" id="barLbl">Estimated Total Variation Value</div>
    </div>
    <button class="cta" id="barCta" disabled>Accept</button>
  </div>

  <!-- confirmation sheet -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <h2 id="sheetTitle">Accept 2 Variations?</h2>
    <p class="sub">Accepting confirms these variations on the contract. This can't be undone in the app — contact your installer if anything changes.</p>
    <div class="rows" id="sheetRows"></div>
    <div class="sheetbtns">
      <button class="sb cancel" id="sheetCancel">Cancel</button>
      <button class="sb confirm" id="sheetConfirm">Accept</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const fmt = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:2});

let DATA = [
  {id:1, t:"Dutch House Security INV TEST", ref:"Variation #23945", rev:"Revision 3", v:120000, status:"pending"},
  {id:2, t:"Kitchen AV Upgrade — Zone 2",   ref:"Variation #23946", rev:"Revision 1", v:48200,  status:"pending"},
  {id:3, t:"Cinema Room Lighting Control",  ref:"Variation #23947", rev:"Revision 2", v:113500, status:"pending"},
  {id:4, t:"Garden Speaker Extension",      ref:"Variation #23948", rev:"Revision 1", v:21400,  status:"pending"},
  {id:5, t:"Rack Rebuild — Comms Room",     ref:"Variation #23949", rev:"Revision 4", v:76150,  status:"pending"},
  {id:6, t:"Master Bedroom Keypads",        ref:"Variation #23950", rev:"Revision 1", v:19800,  status:"pending"},
  {id:7, t:"Network Switch Upgrade",        ref:"Variation #23951", rev:"Revision 2", v:34200,  status:"pending"},
  {id:8, t:"Hallway Motion Sensors",        ref:"Variation #23952", rev:"Revision 1", v:8600,   status:"pending"},
  {id:9, t:"Driveway Gate Intercom",        ref:"Variation #23953", rev:"Revision 2", v:52100,  status:"pending"},
  {id:10,t:"Utility Room Audio",            ref:"Variation #23954", rev:"Revision 1", v:11200,  status:"pending"},
];

const app = document.getElementById('app');
const list = document.getElementById('list');
const selectToggle = document.getElementById('selectToggle');
const bottombar = document.getElementById('bottombar');
const barAmt = document.getElementById('barAmt');
const barLbl = document.getElementById('barLbl');
const barCta = document.getElementById('barCta');
const scrim = document.getElementById('scrim');
const sheet = document.getElementById('sheet');

let selectMode = false;
let selected = new Set();
let pendingConfirm = []; // ids awaiting confirmation

const STATUS_PILL = {
  pending:  '<span class="pill pending"><span class="dot"></span>Pending your review</span>',
  accepted: '<span class="pill accepted"><span class="dot"></span>Accepted</span>',
  rejected: '<span class="pill rejected"><span class="dot"></span>Rejected</span>',
  tbc:      '<span class="pill tbc"><span class="dot"></span>TBC</span>',
};

function render(){
  list.innerHTML = '';
  DATA.forEach(d => {
    const item = document.createElement('div');
    item.className = 'item' + (selected.has(d.id) ? ' selected' : '') + (d.status !== 'pending' ? ' resolved' : '');
    item.dataset.id = d.id;
    item.innerHTML = `
      <div class="checkcol"><span class="chk">${selected.has(d.id) ? '✓' : ''}</span></div>
      <div class="card">
        <div class="r1">${STATUS_PILL[d.status]}<span class="valid">${d.status==='pending' ? 'Valid until 14 April 2026' : ''}</span></div>
        <div class="r2"><div class="title">${d.t}</div><div class="value">${fmt(d.v)}</div></div>
        <div class="r3"><span class="ref">${d.ref}&nbsp;&nbsp;${d.rev}</span><span class="vlabel">Estimated Value</span></div>
        <div class="acts">
          <button class="abtn icon" data-act="comment">💬</button>
          <button class="abtn" data-act="tbc">TBC</button>
          <button class="abtn" data-act="reject">Reject</button>
          <button class="abtn" data-act="accept">Accept</button>
        </div>
      </div>`;
    list.appendChild(item);
  });
  updateChrome();
}

function updateChrome(){
  const pending = DATA.filter(d => d.status === 'pending');
  document.getElementById('pendingCount').textContent = pending.length;
  document.getElementById('summaryText').textContent =
    selectMode ? `${selected.size} of ${pending.length} selected`
               : `${pending.length} Variations pending your review`;

  if (selectMode){
    const sel = DATA.filter(d => selected.has(d.id));
    const total = sel.reduce((s,d)=>s+d.v,0);
    barAmt.textContent = fmt(total);
    barLbl.textContent = 'Estimated Total · Selected';
    barCta.textContent = sel.length ? `Accept ${sel.length} Variation${sel.length>1?'s':''}` : 'Accept';
    barCta.disabled = sel.length === 0;
    bottombar.classList.add('show');
  } else {
    const total = pending.reduce((s,d)=>s+d.v,0);
    barAmt.textContent = fmt(total);
    barLbl.textContent = 'Estimated Total Variation Value';
    barCta.textContent = 'Select to accept';
    barCta.disabled = true;
    bottombar.classList.toggle('show', pending.length > 0);
  }
}

/* select mode toggle */
selectToggle.addEventListener('click', () => {
  selectMode = !selectMode;
  app.classList.toggle('selectmode', selectMode);
  selectToggle.classList.toggle('on', selectMode);
  if (!selectMode) selected.clear();
  render();
});

/* item interactions */
list.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (!item) return;
  const id = +item.dataset.id;
  const d = DATA.find(x => x.id === id);

  const actBtn = e.target.closest('.abtn');
  if (actBtn && !selectMode){
    const act = actBtn.dataset.act;
    if (act === 'accept'){ pendingConfirm = [id]; openSheet(); }
    else if (act === 'reject'){ d.status = 'rejected'; toast(`Rejected · ${d.t}`); render(); }
    else if (act === 'tbc'){ d.status = 'tbc'; toast(`Marked TBC · ${d.t}`); render(); }
    else if (act === 'comment'){ toast('Comment thread (not in this prototype)'); }
    return;
  }

  if (selectMode && d.status === 'pending'){
    selected.has(id) ? selected.delete(id) : selected.add(id);
    render();
  }
});

/* bulk CTA */
barCta.addEventListener('click', () => {
  if (!selectMode || selected.size === 0) return;
  pendingConfirm = [...selected];
  openSheet();
});

/* confirmation sheet */
function openSheet(){
  const items = DATA.filter(d => pendingConfirm.includes(d.id));
  const total = items.reduce((s,d)=>s+d.v,0);
  document.getElementById('sheetTitle').textContent =
    `Accept ${items.length} Variation${items.length>1?'s':''}?`;
  const rows = document.getElementById('sheetRows');
  rows.innerHTML = items.map(d =>
    `<div class="srow"><span class="n">${d.t}</span><span class="v">${fmt(d.v)}</span></div>`).join('')
    + `<div class="srow totalrow"><span class="n">Total</span><span class="v">${fmt(total)}</span></div>`;
  document.getElementById('sheetConfirm').textContent =
    `Accept · ${fmt(total)}`;
  scrim.classList.add('show');
  sheet.classList.add('show');
}
function closeSheet(){
  scrim.classList.remove('show');
  sheet.classList.remove('show');
}
scrim.addEventListener('click', closeSheet);
document.getElementById('sheetCancel').addEventListener('click', closeSheet);
document.getElementById('sheetConfirm').addEventListener('click', () => {
  const items = DATA.filter(d => pendingConfirm.includes(d.id));
  items.forEach(d => d.status = 'accepted');
  toast(`Accepted ${items.length} variation${items.length>1?'s':''}`);
  closeSheet();
  selected.clear();
  if (selectMode){ selectMode = false; app.classList.remove('selectmode'); selectToggle.classList.remove('on'); }
  render();
});

/* toast */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
