<div id="s-login" class="screen on">
<div class="login-page">

  <div class="login-main">

    <!-- Left: photo -->
    <div class="login-photo">
      <img class="room" id="brand-login-photo"
        src="assets/images/b2fba8d8-b116-4b5c-a6d8-07bdb1bcc0ef.png"
        alt="Interior"
        onerror="this.style.display='none'"/>
      <div class="logo-box">
        <img src="assets/images/c9f2450f-e088-4a99-8201-1a4f528f837e.png"
             alt="logo"
             onerror="this.style.display='none'"/>
      </div>
    </div>

    <!-- Right: form -->
    <div class="login-form-panel">
      <div class="login-form-inner">

        <!-- Company logo above heading -->
        <div class="login-company-logo">
          <img id="brand-logo" src="assets/images/721f1d92-43b5-4a75-8e68-a9e62bdf23ff.png"
               alt="company"
               onerror="this.parentElement.style.background='var(--brand-muted)'"/>
        </div>

        <h1 class="login-heading">Login to your project</h1>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="example@example.com"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter Password"/>
        </div>

        <a class="login-btn" onclick="go('dash')">Log in</a>

        <div class="login-options">
          <label class="login-checkbox">
            <input type="checkbox" checked/>
            Stay signed in
          </label>
          <button class="login-forgot" onclick="go('forgot-password')">Forgot Password?</button>
        </div>

      </div>
    </div>

  </div>

  <!-- Footer bar -->
  <div class="login-footer">
    <div class="powered-by brand-powered-by">
      <span>Powered by</span>
      <div class="powered-by-logo">
        <img src="https://www.figma.com/api/mcp/asset/c71cf066-26a2-4f59-98f5-4adeb403ad99"
             width="20" height="23" alt="" onerror="this.style.display='none'"/>
        <img src="https://www.figma.com/api/mcp/asset/36f6bea2-bb64-4760-b470-7c9186884dfb"
             width="62" height="10" alt="WeQuote" onerror="this.style.display='none'"/>
      </div>
    </div>
    <div class="footer-links">
      <a href="#">Contact Us</a>
      <a href="#">Terms of Use</a>
      <a href="#">Privacy Policy</a>
    </div>
  </div>

</div>
</div>
