<div id="s-forgot-password" class="screen">
<div class="login-page">

  <div class="login-main">

    <!-- Left: photo (same as login) -->
    <div class="login-photo">
      <img class="room" src="assets/images/b2fba8d8-b116-4b5c-a6d8-07bdb1bcc0ef.png"
        alt="Interior" onerror="this.style.display='none'"/>
      <div class="logo-box">
        <img src="assets/images/c9f2450f-e088-4a99-8201-1a4f528f837e.png"
             alt="logo" onerror="this.style.display='none'"/>
      </div>
    </div>

    <!-- Right: form -->
    <div class="login-form-panel">
      <div class="login-form-inner">

        <!-- Company logo -->
        <div class="login-company-logo">
          <img id="brand-logo-fp" src="assets/images/721f1d92-43b5-4a75-8e68-a9e62bdf23ff.png"
               alt="company" onerror="this.parentElement.style.background='var(--brand-muted)'"/>
        </div>

        <h1 class="login-heading">Forgot your password?</h1>
        <p class="fp-subtext">Enter your email address and we'll send you a link to reset your password.</p>

        <div class="form-group" style="margin-top:8px;">
          <label for="fp-email">E-mail</label>
          <input id="fp-email" type="email" placeholder="example@example.com"/>
        </div>

        <a class="login-btn" onclick="showFPSuccess()">Send Reset Link</a>

        <!-- Success state (hidden by default) -->
        <div class="fp-success" id="fp-success" style="display:none;">
          <div class="fp-success-icon">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
            </svg>
          </div>
          <p class="fp-success-title">Check your email</p>
          <p class="fp-success-msg">We've sent a password reset link to your email address. Check your inbox and follow the instructions.</p>
        </div>

        <button class="fp-back-btn" onclick="fpGoBack()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to Login
        </button>

      </div>
    </div>

  </div>

  <!-- Footer bar (same as login) -->
  <div class="login-footer">
    <div class="powered-by brand-powered-by">
      <span>Powered by</span>
      <div class="powered-by-logo">
        <img src="https://www.figma.com/api/mcp/asset/c71cf066-26a2-4f59-98f5-4adeb403ad99"
             width="20" height="23" alt="" onerror="this.style.display='none'"/>
        <img src="https://www.figma.com/api/mcp/asset/36f6bea2-bb64-4760-b470-7c9186884dfb"
             width="62" height="10" alt="WeQuote" onerror="this.style.display='none'"/>
      </div>
    </div>
    <div class="footer-links">
      <a href="#">Contact Us</a>
      <a href="#">Terms of Use</a>
      <a href="#">Privacy Policy</a>
    </div>
  </div>

</div>
</div>
