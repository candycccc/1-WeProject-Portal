<div id="s-dash" class="screen">
<div class="dash-page">

  <!-- Header -->
  <header class="dash-header">
    <div class="dash-header-left">
      <div class="dash-logo">
        <img src="assets/images/9b2d4b7f-de0a-4f47-8ffd-6c09fd13404f.png"
             alt="BH" onerror="this.parentElement.style.background='var(--brand-dark)';this.style.display='none'"/>
      </div>
      <span class="dash-company-name">LCR Intergrated system,&#10;Lee Roche</span>
    </div>
    <div class="dash-header-right">
      <button class="dash-bell qp-bell-badge" onclick="toggleNotifPanel(event)">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="dash-user-info">
        <span class="dash-user-name">Mabella Martin</span>
        <span class="dash-user-role" onclick="openProfilePanel()" style="cursor:pointer;">Edit Profile</span>
      </div>
      <div class="dash-avatar" onclick="toggleUserDropdown(event)">MM
        <div class="qp-user-dropdown" id="user-dropdown-dash">
          <div class="qp-user-dropdown-item" onclick="openProfilePanel()">
            Edit Profile
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
          <div class="qp-user-dropdown-item" onclick="closeDropdowns();go('login')">
            Sign out
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div class="dash-tabs">
    <button class="tab-pill active" id="tab-active" onclick="switchTab('active')">
      Active <span class="tab-count">04</span>
    </button>
    <button class="tab-pill" id="tab-archived" onclick="switchTab('archived')">
      Archived <span class="tab-count">12</span>
    </button>
  </div>

  <!-- Cards: Active -->
  <div class="dash-cards" id="cards-active">

    <div class="project-card" onclick="go('detail')">
      <div class="card-top-line"></div>
      <div class="card-info">
        <div class="card-title-row">
          <a class="card-name-link">
            <span class="card-name"><span class="brand-project-name">Ocean Palm Residences</span></span>
            <svg width="20" height="20" fill="none" stroke="#383741" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M7 17L17 7M17 7H7M17 7v10"/>
            </svg>
          </a>
          <div class="card-status">
            <div class="status-dot"></div>
            <span class="card-status-text">Active</span>
          </div>
        </div>
        <div class="card-meta">
          <div>
            <div>Last updated</div>
            <div>About 1 hour ago</div>
          </div>
          <div style="text-align:right;">
            <div>Last viewed</div>
            <div>02 Mar 10:39pm</div>
          </div>
        </div>
      </div>
      <div class="card-photo">
        <img src="assets/images/3b69451b-ae1b-40cf-9560-13e28380852a.png"
             alt="" onerror="this.style.display='none'"/>
      </div>
    </div>

    <div class="project-card" onclick="go('detail')">
      <div class="card-top-line"></div>
      <div class="card-info">
        <div class="card-title-row">
          <a class="card-name-link">
            <span class="card-name">Interior design project</span>
            <svg width="20" height="20" fill="none" stroke="#383741" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M7 17L17 7M17 7H7M17 7v10"/>
            </svg>
          </a>
          <div class="card-status">
            <div class="status-dot"></div>
            <span class="card-status-text">Active</span>
          </div>
        </div>
        <div class="card-meta">
          <div>
            <div>Last updated</div>
            <div>About 1 hour ago</div>
          </div>
          <div style="text-align:right;">
            <div>Last viewed</div>
            <div>02 Mar 10:39pm</div>
          </div>
        </div>
      </div>
      <div class="card-photo">
        <img src="assets/images/3951abf2-0850-4e5c-985f-da76d589a744.png"
             alt="" onerror="this.style.display='none'"/>
      </div>
    </div>

  </div>

  <!-- Cards: Archived (hidden) -->
  <div class="dash-cards" id="cards-archived" style="display:none;">
    <p style="color:#a0a0a0; font-size:14px; grid-column:1/-1; padding:40px 0;">12 archived projects</p>
  </div>

  <!-- Footer -->
  <div class="dash-footer">
    <div class="powered-by brand-powered-by" style="justify-content:center;">
      <span>Powered by</span>
      <div class="powered-by-logo">
        <img src="assets/images/wq-icon.svg" width="20" height="22" alt=""/>
        <img src="assets/images/wq-wordmark.svg" width="62" height="10" alt="WeQuote"/>
      </div>
    </div>
  </div>

</div>
</div>
